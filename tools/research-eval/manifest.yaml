name: research-eval
type: shell
command: bash run.sh
parameters:
  - name: paper
    type: string
    description: Path to the paper file (.pdf or .md).
    required: true
  - name: workspace
    type: string
    description: Path to the workspace directory the paper claims to be based on.
    required: true
  - name: config
    type: string
    description: Path to api-key.md (provider / model / api key / base url).
    required: false
  - name: output
    type: string
    description: Write the review report to this file (default stdout).
    required: false
  - name: output-format
    type: string
    description: "markdown (default) or json."
    required: false
  - name: extra-context
    type: string
    description: Free-form notes for the reviewer (venue, focus areas, budget caps).
    required: false
